name: Deploy Frontend — QA

on:
  push:
    branches:
      - qa

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}:qa

jobs:
  build-and-push:
    name: Build & push frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

  deploy:
    name: Deploy to QA server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy frontend service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.QA_HOST }}
          username: ${{ secrets.QA_USER }}
          key: ${{ secrets.QA_SSH_KEY }}
          script: |
            cd /opt/jelc-auth

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.qa.yml pull frontend

            docker compose -f docker-compose.qa.yml up -d --no-deps frontend

            docker image prune -f
