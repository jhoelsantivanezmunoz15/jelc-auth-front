<div class="min-h-screen bg-slate-50 flex items-center justify-center px-4">
  <div class="w-full max-w-sm bg-white rounded-xl shadow-md p-8">
    <h2 class="text-2xl font-bold text-center mb-6">Iniciar sesión</h2>

    @if (error()) {
      <div class="mb-4 px-4 py-3 text-sm bg-red-50 text-red-800 border border-red-200 rounded-md">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="correo@ejemplo.com"
               class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20" />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="block mt-1 text-xs text-red-600">Email inválido</span>
        }
      </div>

      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input id="password" type="password" formControlName="password"
               class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20" />
      </div>

      <button type="submit" [disabled]="form.invalid || loading()"
              class="w-full py-2 px-4 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer transition-colors">
        {{ loading() ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>

    <div class="mt-4 text-center text-sm space-y-1">
      <p><a routerLink="/auth/reset-password" class="text-indigo-600 hover:underline">¿Olvidaste tu contraseña?</a></p>
      <p class="text-gray-500">¿No tienes cuenta? <a routerLink="/auth/register" class="text-indigo-600 hover:underline">Regístrate</a></p>
    </div>
  </div>
</div>
