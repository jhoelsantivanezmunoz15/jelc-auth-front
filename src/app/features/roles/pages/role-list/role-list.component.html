<div class="page-container">
  <div class="page-header">
    <h2>Roles</h2>
    <a routerLink="create" class="btn btn-primary">Nuevo rol</a>
  </div>

  @if (error()) {
    <div class="alert alert-error">{{ error() }}</div>
  }

  @if (loading()) {
    <p>Cargando...</p>
  } @else {
    <table class="data-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Permisos</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (role of roles(); track role.id) {
          <tr>
            <td>{{ role.name }}</td>
            <td>{{ role.description }}</td>
            <td>{{ role.permissions.length }}</td>
            <td>
              <a [routerLink]="['edit', role.id]" class="btn btn-sm">Editar</a>
              <button class="btn btn-sm btn-danger" (click)="delete(role.id)">Eliminar</button>
            </td>
          </tr>
        } @empty {
          <tr><td colspan="4">No hay roles registrados</td></tr>
        }
      </tbody>
    </table>
  }
</div>
