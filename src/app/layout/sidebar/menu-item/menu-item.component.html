<li>
  @if (isLeaf) {
    <!-- Leaf node: navigable link -->
    <a [routerLink]="item.route" routerLinkActive="bg-indigo-50 !text-indigo-600"
       [style.padding-left.px]="24 + depth * 12"
       class="flex items-center gap-2 pr-4 py-2 text-sm text-gray-700 no-underline hover:bg-indigo-50 hover:text-indigo-600 transition-colors">
      @if (item.icon) {
        <span class="w-4 shrink-0 text-center text-xs opacity-70">{{ item.icon }}</span>
      } @else {
        <span class="w-4 shrink-0"></span>
      }
      <span class="truncate">{{ item.name }}</span>
    </a>
  } @else if (hasChildren) {
    <!-- Group node: expandable -->
    <button type="button" (click)="toggle()"
            [style.padding-left.px]="24 + depth * 12"
            class="flex items-center justify-between w-full pr-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 cursor-pointer transition-colors bg-transparent border-none text-left">
      <span class="flex items-center gap-2">
        @if (item.icon) {
          <span class="w-4 shrink-0 text-center text-xs opacity-70">{{ item.icon }}</span>
        } @else {
          <span class="w-4 shrink-0"></span>
        }
        <span class="truncate font-medium">{{ item.name }}</span>
      </span>
      <svg class="w-3 h-3 shrink-0 transition-transform duration-200"
           [class.rotate-90]="expanded()"
           fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
      </svg>
    </button>
    @if (expanded()) {
      <ul class="list-none m-0 p-0">
        @for (child of item.children; track child.id) {
          <app-menu-item [item]="child" [depth]="depth + 1" />
        }
      </ul>
    }
  } @else {
    <!-- Group node without route and without children: static label -->
    <span [style.padding-left.px]="24 + depth * 12"
          class="flex items-center gap-2 pr-4 py-2 text-sm text-gray-500">
      @if (item.icon) {
        <span class="w-4 shrink-0 text-center text-xs opacity-70">{{ item.icon }}</span>
      } @else {
        <span class="w-4 shrink-0"></span>
      }
      <span class="truncate font-medium">{{ item.name }}</span>
    </span>
  }
</li>
