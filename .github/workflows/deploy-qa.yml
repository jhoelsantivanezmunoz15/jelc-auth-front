name: Deploy Frontend — QA

on:
  push:
    branches:
      - qa

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):qa" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}

  deploy:
    name: Deploy to QA server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy frontend service
        env:
          SSH_KEY: ${{ secrets.QA_SSH_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem

          ssh -i /tmp/deploy_key.pem \
            -o StrictHostKeyChecking=no \
            ${{ secrets.QA_USER }}@${{ secrets.QA_HOST }} \
            "cd /opt/jelc-auth && \
             echo '$GH_TOKEN' | docker login ghcr.io -u $GH_ACTOR --password-stdin && \
             docker compose -f docker-compose.qa.yml pull frontend && \
             docker compose -f docker-compose.qa.yml up -d --no-deps frontend && \
             docker image prune -f"

          rm -f /tmp/deploy_key.pem
