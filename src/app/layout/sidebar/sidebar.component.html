<aside class="w-56 bg-white border-r border-gray-200 py-6 shrink-0 flex flex-col">

  @if (menuState.loading()) {
    <div class="px-6 space-y-2">
      @for (i of [1, 2, 3, 4]; track i) {
        <div class="h-4 bg-gray-100 rounded animate-pulse"></div>
      }
    </div>
  } @else if (menuState.loadError()) {
    <div class="px-6 py-2 text-xs text-red-400">
      No se pudo cargar el menú.
    </div>
  } @else if (menuState.tree().length === 0) {
    <div class="px-6 py-2 text-xs text-gray-400">
      Sin elementos de navegación.
    </div>
  } @else {
    <nav>
      <ul class="list-none m-0 p-0">
        @for (item of menuState.tree(); track item.id) {
          <app-menu-item [item]="item" [depth]="0" />
        }
      </ul>
    </nav>
  }

</aside>
