<div class="min-h-screen bg-slate-50 flex items-center justify-center px-4">
  <div class="w-full max-w-sm bg-white rounded-xl shadow-md p-8">
    <h2 class="text-2xl font-bold text-center mb-6">Recuperar contraseña</h2>

    @if (!passwordResetEnabled()) {
      <div class="px-4 py-3 text-sm bg-yellow-50 text-yellow-800 border border-yellow-200 rounded-md">
        La recuperación de contraseña está deshabilitada temporalmente.
      </div>
    } @else if (success()) {
      <div class="px-4 py-3 text-sm bg-green-50 text-green-800 border border-green-200 rounded-md">
        Revisa tu correo electrónico para continuar con el proceso.
      </div>
    } @else {
      @if (error()) {
        <div class="mb-4 px-4 py-3 text-sm bg-red-50 text-red-800 border border-red-200 rounded-md">{{ error() }}</div>
      }
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" formControlName="email"
                 class="w-full px-3 py-2 text-sm border border-gray-300 rounded-md focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20" />
        </div>
        <button type="submit" [disabled]="form.invalid || loading()"
                class="w-full py-2 px-4 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer transition-colors">
          {{ loading() ? 'Enviando...' : 'Enviar enlace' }}
        </button>
      </form>
    }

    <p class="mt-4 text-center text-sm">
      <a routerLink="/auth/login" class="text-indigo-600 hover:underline">Volver al login</a>
    </p>
  </div>
</div>
