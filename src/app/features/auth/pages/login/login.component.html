<div class="auth-container">
  <h2>Iniciar sesión</h2>

  @if (error()) {
    <div class="alert alert-error">{{ error() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" placeholder="correo@ejemplo.com" />
      @if (form.get('email')?.invalid && form.get('email')?.touched) {
        <span class="field-error">Email inválido</span>
      }
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input id="password" type="password" formControlName="password" />
      @if (form.get('password')?.invalid && form.get('password')?.touched) {
        <span class="field-error">Mínimo 8 caracteres</span>
      }
    </div>

    <button type="submit" [disabled]="form.invalid || loading()">
      {{ loading() ? 'Ingresando...' : 'Ingresar' }}
    </button>
  </form>

  <p><a routerLink="/auth/reset-password">¿Olvidaste tu contraseña?</a></p>
  <p>¿No tienes cuenta? <a routerLink="/auth/register">Regístrate</a></p>
</div>
