<aside class="w-56 bg-white border-r border-gray-200 py-6 shrink-0 flex flex-col justify-between">

  @if (menuState.loading()) {
    <div class="px-6 space-y-2">
      @for (i of [1, 2, 3, 4]; track i) {
        <div class="h-4 bg-gray-100 rounded animate-pulse"></div>
      }
    </div>
  } @else if (menuState.loadError()) {
    <div class="px-6 py-2 text-xs text-red-400">
      No se pudo cargar el menú.
    </div>
  } @else if (menuState.tree().length === 0) {
    <div class="px-6 py-2 text-xs text-gray-400">
      Sin elementos de navegación.
    </div>
  } @else {
    <nav>
      <ul class="list-none m-0 p-0">
        @for (item of menuState.tree(); track item.id) {
          <app-menu-item [item]="item" [depth]="0" />
        }
      </ul>
    </nav>
  }

  <div class="px-4 pt-4 border-t border-gray-200">
    <a routerLink="/profile"
       class="flex items-center gap-2 px-3 py-2 text-sm text-gray-600 rounded-md hover:bg-gray-100 hover:text-gray-900 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
      Mi perfil
    </a>
  </div>

</aside>
